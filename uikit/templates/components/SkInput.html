<template>
  {{$name := .name}}
  {{$label := .label}}
  {{$placeholder := .placeholder}}
  <div class="space-y-1.5">
    {{if $label}}<label class="block text-sm font-medium text-slate-700" for="{{$name}}">{{$label}}</label>{{end}}
    <input id="{{$name}}" name="{{$name}}" placeholder="{{$placeholder}}" class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition focus:border-slate-600 focus:ring-2 focus:ring-slate-200" />
  </div>
</template>
