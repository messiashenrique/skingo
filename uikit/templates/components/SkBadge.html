<template>
  {{$text := paramOr 0 .text}}
  {{$variant := paramOr 1 (paramOr 2 .variant)}}
  {{$variantClass := ""}}
  {{if eq $variant "success"}}{{$variantClass = "bg-emerald-100 text-emerald-700"}}{{else if eq $variant "warning"}}{{$variantClass = "bg-amber-100 text-amber-700"}}{{else}}{{$variantClass = "bg-slate-100 text-slate-700"}}{{end}}
  <span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold {{$variantClass}}">
    {{$text}}
  </span>
</template>
